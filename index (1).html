<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Fashion - Premium Clothing Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #D4AF37;
            --primary-black: #1a1a1a;
            --secondary-white: #f8f5f0;
            --accent-red: #8B0000;
            --text-dark: #333;
            --text-light: #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary-gold), #b8942f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--primary-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-icon {
            position: relative;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-dark);
            transition: transform 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.2);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-red);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23f8f5f0" width="1200" height="800"/><path fill="%23D4AF37" opacity="0.1" d="M0 400Q300 200 600 400T1200 400V800H0z"/><circle fill="%23b8942f" opacity="0.05" cx="200" cy="300" r="100"/><circle fill="%23993300" opacity="0.03" cx="1000" cy="500" r="150"/></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1s 0.5s forwards;
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s 0.8s forwards;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary-gold);
            color: var(--primary-black);
            padding: 1rem 3rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212,175,55,0.4);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s 1.1s forwards;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(212,175,55,0.6);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Products Section */
        .products {
            padding: 100px 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, var(--primary-gold), #b8942f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            opacity: 0;
            transform: translateY(50px);
            animation: slideInUp 0.8s forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        .product-image {
            height: 300px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .product-card:hover .product-image::before {
            left: 100%;
        }

        .product-info {
            padding: 2rem;
        }

        .product-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--primary-black);
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-gold);
            margin-bottom: 1rem;
        }

        .product-add {
            width: 100%;
            background: linear-gradient(45deg, var(--primary-gold), #b8942f);
            color: var(--primary-black);
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .product-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212,175,55,0.4);
        }

        /* Categories */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .category-card {
            height: 200px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .category-card i {
            font-size: 3rem;
            margin-bottom: 1rem;
            z-index: 2;
            position: relative;
        }

        .category-card span {
            z-index: 2;
            position: relative;
        }

        .category-card:hover {
            transform: scale(1.05) translateY(-10px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scroll animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">Luxe Fashion</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Shop</a></li>
                <li><a href="#men">Men</a></li>
                <li><a href="#women">Women</a></li>
                <li><a href="#about">About</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>Elevate Your Style</h1>
            <p>Premium Quality | Timeless Design | Unmatched Comfort</p>
            <a href="#products" class="cta-button">Shop Collection</a>
        </div>
    </section>

    <!-- Products Section -->
    <section class="products fade-in" id="products">
        <h2 class="section-title">Featured Collection</h2>
        <div class="products-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <div class="product-image" style="background-image: linear-gradient(45deg, #ff6b6b, #feca57), url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 500%22><rect fill=%22%23f8f9fa%22 width=%22400%22 height=%22500%22/><path fill=%22%23333%22 d=%22M100 50 Q150 30 200 50 Q250 30 300 50 L300 400 Q250 420 200 400 Q150 420 100 400 Z%22/><circle fill=%22%23666%22 cx=%22180%22 cy=%22120%22 r=%2230%22/><circle fill=%22%23666%22 cx=%22220%22 cy=%22120%22 r=%2230%22/><rect fill=%22%23444%22 x=%22140%22 y=%22200%22 width=%22120%22 height=%22150%22 rx=%2210%22/></svg>');"></div>

                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </div>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <div class="product-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%), url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 500%22><rect fill=%22%23f0f4f8%22 width=%22400%22 height=%22500%22/><path fill=%22%23222%22 d=%22M50 100 Q100 80 150 100 Q200 80 250 100 L250 350 Q200 370 150 350 Q100 370 50 350 Z%22/><rect fill=%22%23555%22 x=%2280%22 y=%22150%22 width=%22240%22 height=%22200%22 rx=%2220%22/><circle fill=%22%23333%22 cx=%22100%22 cy=%22300%22 r=%2240%22/><circle fill=%22%23333%22 cx=%22300%22 cy=%22300%22 r=%2240%22/></svg>');"></div>
                <div class="product-info">
                    <h3 class="product-title">Silk Dress</h3>
                    <div class="product-price">$189</div>
                    <button class="product-add" onclick="addToCart('Silk Dress', 189)">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </div>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-image" style="background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%), url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 500%22><rect fill=%22%23fff5f7%22 width=%22400%22 height=%22500%22/><path fill=%22%23111%22 d=%22M80 80 Q130 60 180 80 Q230 60 280 80 L280 380 Q230 400 180 380 Q130 400 80 380 Z%22/><rect fill=%22%23444%22 x=%22120%22 y=%22180%22 width=%22160%22 height=%22200%22 rx=%2225%22/><path fill=%22%23333%22 d=%22M150 250 Q175 230 200 250 Q225 230 250 250%22/></svg>');"></div>
                <div class="product-info">
                    <h3 class="product-title">Cashmere Sweater</h3>
                    <div class="product-price">$249</div>
                    <button class="product-add" onclick="addToCart('Cashmere Sweater', 249)">
                        <i class="fas fa-shopping-cart"></i> Add to Cart
                    </button>
                </div>
            </div>

            <!-- Product 4 -->
            <div class="product-card">
                <div class="product-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%), url('data:image/svg+xml,<svg xmlns=%22http://www.w
